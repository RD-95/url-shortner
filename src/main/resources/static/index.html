<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
      font-size: 40px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="url"] {
      flex: 1;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }

    input[type="url"]::placeholder { color: rgba(255,255,255,0.35); }
    input[type="url"]:focus { border-color: #a78bfa; }

    button.shorten-btn {
      padding: 16px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button.shorten-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    button.shorten-btn:active { transform: translateY(0); }

    .error-msg {
      color: #f87171;
      font-size: 0.88rem;
      margin-top: -14px;
      margin-bottom: 16px;
      display: none;
      padding-left: 4px;
    }

    .result-box {
      display: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 14px;
      padding: 20px 22px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
    }

    .result-url-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-url {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 600;
      color: #a78bfa;
      word-break: break-all;
      text-decoration: none;
    }

    .result-url:hover { text-decoration: underline; }

    .copy-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(167,139,250,0.5);
      background: transparent;
      color: #a78bfa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: rgba(167,139,250,0.15); }
    .copy-btn.copied { color: #34d399; border-color: #34d399; }

    .original-label {
      margin-top: 14px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      word-break: break-all;
    }

    .loading {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      display: none;
      margin-top: 8px;
    }

    .history {
      margin-top: 28px;
    }

    .history-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      margin-bottom: 8px;
      font-size: 0.85rem;
      gap: 10px;
    }

    .history-item .orig { color: rgba(255,255,255,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .history-item .short { color: #60a5fa; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔗</div>
    <h1>URL Shortener</h1>
    <p class="subtitle">Paste your long URL and get a short, shareable link instantly</p>

    <div class="input-group">
      <input type="url" id="urlInput" placeholder="https://your-very-long-url.com/goes/here" />
      <button class="shorten-btn" onclick="shortenUrl()">Shorten</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="loading" id="loading">⏳ Shortening...</div>

    <div class="result-box" id="resultBox">
      <div class="result-label">Your short link</div>
      <div class="result-url-row">
        <a class="result-url" id="resultUrl" href="#" target="_blank"></a>
        <button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copy</button>
      </div>
      <div class="original-label" id="originalLabel"></div>
    </div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-title">Recent links</div>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const history = [];

    async function shortenUrl() {
      const input = document.getElementById('urlInput');
      const errorMsg = document.getElementById('errorMsg');
      const resultBox = document.getElementById('resultBox');
      const loading = document.getElementById('loading');
      const url = input.value.trim();

      errorMsg.style.display = 'none';
      resultBox.style.display = 'none';

      if (!url) {
        showError('Please enter a URL.');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showError('URL must start with http:// or https://');
        return;
      }

      loading.style.display = 'block';

      try {
        const response = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ originalUrl: url })
        });

        loading.style.display = 'none';

        if (!response.ok) {
          showError('Something went wrong. Please try again.');
          return;
        }

        const data = await response.json();

        document.getElementById('resultUrl').textContent = data.shortUrl;
        document.getElementById('resultUrl').href = data.shortUrl;
        document.getElementById('originalLabel').textContent = '↳ ' + data.originalUrl;
        document.getElementById('copyBtn').textContent = 'Copy';
        document.getElementById('copyBtn').classList.remove('copied');
        resultBox.style.display = 'block';

        addToHistory(data.originalUrl, data.shortUrl);
        input.value = '';

      } catch (err) {
        loading.style.display = 'none';
        showError('Network error. Is the server running?');
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function copyUrl() {
      const url = document.getElementById('resultUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function addToHistory(original, short) {
      history.unshift({ original, short });
      if (history.length > 5) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      if (history.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span class="orig" title="${h.original}">${h.original}</span>
          <a class="short" href="${h.short}" target="_blank">${h.short}</a>
        </div>
      `).join('');
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
  </script>
</body>
</html>
